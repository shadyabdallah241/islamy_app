name: islamy
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_native_splash: ^2.4.7
  carousel_slider: ^5.1.1
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0



flutter:


  uses-material-design: true


  assets:
    - assets/images/
    - assets/hadeeth/
    - assets/suras/
    - assets/azkar/azkar_evening.txt
    - assets/azkar/azkar_morning.txt

  fonts:
    - family: Janna LT
      fonts:
        - asset: assets/fonts/janna_bold.ttf
          weight: 700
